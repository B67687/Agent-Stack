name: Release Update Check

on:
  schedule:
    - cron: "0 6 */2 * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run update check
        id: check
        run: |
          chmod +x scripts/check-updates.sh
          RESULT=$(bash scripts/check-updates.sh 2>&1 | tee /dev/stderr)
          # Last line containing [ is the JSON output
          JSON=$(echo "$RESULT" | grep -E '^\[' | tail -1)
          echo "json=$JSON" >> "$GITHUB_OUTPUT"

      - name: Create issue for each update found
        if: ${{ fromJson(steps.check.outputs.json)[0] != null }}
        uses: actions/github-script@v7
        with:
          script: |
            const updates = ${{ steps.check.outputs.json }};
            for (const u of updates) {
              const body = [
                `## ${u.package}: ${u.current_version} → ${u.latest_version}`,
                '',
                '**Source:** ' + u.source,
                '**Update command:** `' + u.update_cmd + '`',
                '',
                '### Release Notes',
                u.notes || 'See release page for details.',
                '',
                '### Impact Assessment',
                '- [ ] Breaking changes?',
                '- [ ] Config format changed?',
                '- [ ] New features worth adopting?',
                '- [ ] Security fixes included?',
                '',
                '### How to Update',
                '```bash',
                '# 1. Run the update',
                u.update_cmd,
                '',
                '# 2. Update the tracked version in docs/VERSIONS.md',
                '# 3. Run the verify suite: bash scripts/verify.sh',
                '# 4. Commit and push',
                '```',
                '',
                '---',
                '*Auto-generated by release tracker — reviewed every 2 days*'
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Release: ${u.package} ${u.current_version} → ${u.latest_version}`,
                body: body,
                labels: ['release-update']
              });
            }

      - name: No updates found
        if: ${{ fromJson(steps.check.outputs.json)[0] == null }}
        run: echo "All tracked versions are up to date."
